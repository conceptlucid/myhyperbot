<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="url(#grad)"/>
  
  <!-- Robot head -->
  <rect x="120" y="100" width="160" height="140" rx="20" fill="#0a0a0a"/>
  
  <!-- Eyes -->
  <circle cx="160" cy="160" r="25" fill="#00d4ff"/>
  <circle cx="240" cy="160" r="25" fill="#00d4ff"/>
  
  <!-- Eye shine -->
  <circle cx="168" cy="152" r="8" fill="#fff"/>
  <circle cx="248" cy="152" r="8" fill="#fff"/>
  
  <!-- Mouth -->
  <rect x="155" y="190" width="90" height="20" rx="10" fill="#00d4ff"/>
  
  <!-- Antenna -->
  <line x1="200" y1="100" x2="200" y2="60" stroke="#0a0a0a" stroke-width="8"/>
  <circle cx="200" cy="50" r="15" fill="#00d4ff"/>
  
  <!-- Computer screen -->
  <rect x="80" y="260" width="240" height="100" rx="10" fill="#0a0a0a" stroke="#00d4ff" stroke-width="4"/>
  <rect x="90" y="270" width="220" height="80" fill="#111"/>
  
  <!-- Screen code lines -->
  <line x1="100" y1="290" x2="180" y2="290" stroke="#00d4ff" stroke-width="3"/>
  <line x1="100" y1="310" x2="220" y2="310" stroke="#00d4ff" stroke-width="3"/>
  <line x1="100" y1="330" x2="160" y2="330" stroke="#00ff88" stroke-width="3"/>
</svg>
